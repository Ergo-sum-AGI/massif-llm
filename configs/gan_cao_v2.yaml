# configs/gan_cao_v2.yaml
# Gan Cao v2 - Optimized for Accelerator Class

# Architecture
d_model: 512
n_layers: 12
n_heads: 8
vocab_size: 50257
max_seq_len: 256
track_norms: true

# Training (v2: higher LR for fine-tuning)
total_steps: 50000
batch_size: 1
grad_accum_steps: 4
learning_rate: 0.0003
weight_decay: 0.1
warmup_steps: 2000
grad_clip: 1.0
log_every: 100
checkpoint_every: 2000
run_name: gan_cao_v2_accelerator

# MASSIF Regularization (v2: stronger)
massif_reg_enabled: true
massif_warmup_steps: 2000
persist_lambda: 0.01
persist_threshold: 0.3
norm_stab_lambda: 0.06
kappa_lambda: 0.02
kappa_target: 2.0
